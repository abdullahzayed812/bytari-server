# Development override
services:
  backend:
    ports:
      - "3001:3001"
    volumes:
      # Mount source code for hot reload
      - ./:/app
      - /app/node_modules
    command: sh -c "bun run db/migrations/migrate.ts && bun run db/seeds/index.ts && bun run dev"
    environment:
      NODE_ENV: development
